<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBI 迁移工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 方案切换栏 ── */
    #variant-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      height: 40px; background: #1a1a2e;
      display: flex; align-items: center; gap: 4px; padding: 0 16px;
      font-family: -apple-system, sans-serif;
    }
    #variant-bar .label { color: #888; font-size: 12px; margin-right: 8px; }
    .v-tab {
      padding: 4px 14px; border-radius: 4px; border: none; cursor: pointer;
      font-size: 12px; background: transparent; color: #aaa;
    }
    .v-tab.active { background: #0047FD; color: #fff; }
    .v-tab:hover:not(.active) { background: rgba(255,255,255,0.1); color: #fff; }
    .v-demo-toggle {
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
      background: transparent; color: #666; border: 1px solid rgba(255,255,255,0.15);
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .v-demo-toggle.active { background: rgba(255,200,0,0.12); color: #FFC107; border-color: rgba(255,193,7,0.35); }
    .v-demo-toggle:hover:not(.active) { background: rgba(255,255,255,0.08); color: #bbb; }
    .demo-control { display: none !important; }
    body.demo-mode .demo-control { display: flex !important; }
    body.demo-mode .demo-control-block { display: block !important; }
    .variant { display: none; }
    .variant.active { display: contents; }
    body { padding-top: 40px; }

    /* ── 设计 token ── */
    :root {
      --brand-6: #2562FF;
      --brand-7: #0047FD;
      --neutral-0: #FFFFFF;
      --neutral-1: #F7F8FA;
      --neutral-2: #F0F1F5;
      --neutral-3: #E6E8ED;
      --neutral-8: #8A92A8;
      --neutral-9: #5D6581;
      --neutral-10: #222D53;
      --neutral-11: #091640;
      --success: #00B96B;
      --success-bg: #F0FFF7;
      --warning: #FA8C16;
      --warning-bg: #FFF7E6;
      --error: #F5222D;
      --error-bg: #FFF1F0;
    }

    /* ── 全局 ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--neutral-1);
      color: var(--neutral-10);
      min-height: 100vh;
    }

    /* ── 页面外壳 ── */
    .app-shell {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── 页头 ── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .app-logo {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--brand-7);
      display: flex; align-items: center; justify-content: center;
    }
    .app-logo svg { width: 20px; height: 20px; color: #fff; }
    .app-title { font-size: 20px; font-weight: 600; color: var(--neutral-11); }
    .app-subtitle { font-size: 13px; color: var(--neutral-9); margin-top: 2px; }

    /* ── 步骤进度条 ── */
    .step-nav {
      display: flex;
      align-items: center;
      margin-bottom: 32px;
    }
    .step-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      position: relative; flex: 1;
    }
    .step-circle {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      border: 2px solid var(--neutral-3);
      background: var(--neutral-0);
      color: var(--neutral-8);
      position: relative; z-index: 1;
      transition: all 0.2s;
    }
    .step-circle.done {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .step-circle.active {
      background: var(--brand-7);
      border-color: var(--brand-7);
      color: #fff;
    }
    .step-label {
      font-size: 11px; color: var(--neutral-8);
      white-space: nowrap;
      transition: color 0.2s;
    }
    .step-label.active { color: var(--brand-7); font-weight: 500; }
    .step-label.done { color: var(--success); }
    .step-connector {
      flex: 1;
      height: 2px;
      background: var(--neutral-3);
      margin-top: -22px;
      margin-bottom: 28px;
      transition: background 0.2s;
    }
    .step-connector.done { background: var(--success); }

    /* ── 卡片 ── */
    .card {
      background: var(--neutral-0);
      border: 1px solid var(--neutral-3);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 0 6px rgba(9,30,64,0.06);
    }
    .card + .card { margin-top: 16px; }
    .card-title {
      font-size: 15px; font-weight: 600; color: var(--neutral-11);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── 检查项 ── */
    .check-list { display: flex; flex-direction: column; gap: 12px; }
    .check-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      background: var(--neutral-1);
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .check-item.checking { border-color: var(--neutral-3); }
    .check-item.ok { background: var(--success-bg); border-color: rgba(0,185,107,0.2); }
    .check-item.warn { background: var(--warning-bg); border-color: rgba(250,140,22,0.2); }
    .check-item.error { background: var(--error-bg); border-color: rgba(245,34,45,0.2); }

    .check-icon {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .check-icon.spin {
      border: 2px solid var(--neutral-3);
      border-top-color: var(--brand-7);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .check-icon.ok { background: var(--success); }
    .check-icon.warn { background: var(--warning); }
    .check-icon.error { background: var(--error); }
    .check-icon svg { width: 12px; height: 12px; color: #fff; }

    .check-body { flex: 1; }
    .check-name { font-size: 13px; font-weight: 500; color: var(--neutral-10); }
    .check-desc { font-size: 12px; color: var(--neutral-9); margin-top: 2px; }
    .check-extra {
      margin-top: 8px; padding: 8px 10px;
      background: rgba(250,140,22,0.08);
      border-radius: 6px;
      font-size: 12px; color: var(--warning);
      display: flex; align-items: flex-start; gap: 6px;
    }

    /* ── 资产扫描 ── */
    .scan-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .scan-cell {
      padding: 14px 16px;
      border-radius: 8px;
      background: var(--neutral-1);
      border: 1px solid var(--neutral-3);
    }
    .scan-cell-label { font-size: 12px; color: var(--neutral-9); margin-bottom: 4px; }
    .scan-cell-count {
      font-size: 22px; font-weight: 600; color: var(--neutral-11);
    }
    .scan-cell-count.loading {
      width: 48px; height: 22px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--neutral-2) 25%, var(--neutral-3) 50%, var(--neutral-2) 75%);
      background-size: 200%;
      animation: shimmer 1.2s ease infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .scan-status {
      margin-top: 14px; padding: 10px 12px;
      border-radius: 8px; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
    }
    .scan-status.scanning { background: var(--neutral-2); color: var(--neutral-9); }
    .scan-status.done { background: var(--success-bg); color: var(--success); }

    /* ── 映射预览 ── */
    .mapping-section { margin-bottom: 20px; }
    .mapping-section-title {
      font-size: 12px; font-weight: 500; color: var(--neutral-9);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .mapping-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 8px; border: 1px solid var(--neutral-3);
      margin-bottom: 8px;
      font-size: 13px;
    }
    .mapping-row.conflict { border-color: rgba(245,34,45,0.3); background: var(--error-bg); }
    .mapping-tag {
      padding: 2px 8px; border-radius: 20px; font-size: 11px;
      background: var(--neutral-2); color: var(--neutral-9);
    }
    .mapping-arrow { color: var(--neutral-8); flex-shrink: 0; }
    .mapping-arrow svg { width: 14px; height: 14px; }
    .mapping-name { font-weight: 500; color: var(--neutral-10); flex: 1; }
    .conflict-badge {
      padding: 2px 8px; border-radius: 20px; font-size: 11px;
      background: var(--error-bg); color: var(--error);
      border: 1px solid rgba(245,34,45,0.2);
    }

    /* ── 冲突处理 ── */
    .conflict-item {
      padding: 14px 16px;
      border-radius: 8px; border: 1px solid var(--neutral-3);
      margin-bottom: 10px;
    }
    .conflict-item-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .conflict-type { font-size: 12px; color: var(--error); font-weight: 500; }
    .conflict-name { font-size: 14px; font-weight: 500; color: var(--neutral-11); flex: 1; }
    .radio-group { display: flex; flex-direction: column; gap: 6px; }
    .radio-label {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--neutral-3);
      font-size: 13px; color: var(--neutral-10);
      transition: border-color 0.15s;
    }
    .radio-label:has(input:checked) { border-color: var(--brand-7); background: rgba(37,98,255,0.04); }
    .radio-label input { accent-color: var(--brand-7); }

    /* ── 执行进度 ── */
    .exec-progress {
      margin-bottom: 16px;
    }
    .progress-track {
      height: 6px; border-radius: 3px;
      background: var(--neutral-2); overflow: hidden; margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%; border-radius: 3px;
      background: var(--brand-7);
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 12px; color: var(--neutral-9); display: flex; justify-content: space-between; }

    .exec-log {
      background: #0D1117; border-radius: 8px; padding: 14px 16px;
      font-family: "SF Mono", "Monaco", "Menlo", monospace;
      font-size: 12px; line-height: 1.7;
      max-height: 200px; overflow-y: auto;
    }
    .log-line { color: #8B949E; }
    .log-line.ok { color: #3FB950; }
    .log-line.warn { color: #D29922; }
    .log-line.info { color: #58A6FF; }

    /* ── 迁移报告 ── */
    .report-summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      margin-bottom: 20px;
    }
    .report-stat {
      text-align: center; padding: 16px 12px;
      border-radius: 8px; background: var(--neutral-1); border: 1px solid var(--neutral-3);
    }
    .report-stat-num { font-size: 24px; font-weight: 700; color: var(--neutral-11); }
    .report-stat-num.ok { color: var(--success); }
    .report-stat-num.warn { color: var(--warning); }
    .report-stat-label { font-size: 12px; color: var(--neutral-9); margin-top: 4px; }

    /* ── 底部操作栏 ── */
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--neutral-0);
      border-top: 1px solid var(--neutral-3);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: flex-end; gap: 10px;
      z-index: 100;
    }
    .btn {
      padding: 8px 20px; border-radius: 6px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; border: none;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--brand-7); color: #fff;
    }
    .btn-primary:hover { background: #003FD9; }
    .btn-primary:disabled { background: var(--neutral-3); color: var(--neutral-8); cursor: not-allowed; }
    .btn-secondary {
      background: transparent; color: var(--neutral-10);
      border: 1px solid var(--neutral-3);
    }
    .btn-secondary:hover { border-color: var(--neutral-8); }

    /* ── demo 控件 ── */
    .demo-control {
      position: fixed; top: 48px; right: 16px; z-index: 9000;
      background: rgba(26,26,46,0.96);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 12px;
      display: flex; flex-direction: column; gap: 6px; min-width: 140px;
    }
    .demo-control-block { display: none; }
    .demo-control label { font-size: 11px; color: #888; margin-bottom: 2px; display: block; }
    .demo-btn {
      padding: 5px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: #ccc; font-size: 11px; cursor: pointer; text-align: left;
    }
    .demo-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .demo-btn.active-state { border-color: #0047FD; color: #58a6ff; }

    /* ── 注意提示 ── */
    .notice {
      padding: 10px 14px; border-radius: 8px;
      background: var(--warning-bg); border: 1px solid rgba(250,140,22,0.25);
      font-size: 13px; color: var(--warning);
      display: flex; align-items: flex-start; gap: 8px;
      margin-bottom: 16px;
    }
    .notice svg { flex-shrink: 0; margin-top: 1px; }

    /* ── 完成态 ── */
    .success-banner {
      text-align: center; padding: 40px 20px;
    }
    .success-icon {
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--success); display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .success-icon svg { width: 28px; height: 28px; color: #fff; }
    .success-title { font-size: 20px; font-weight: 600; color: var(--neutral-11); margin-bottom: 6px; }
    .success-desc { font-size: 14px; color: var(--neutral-9); }
  </style>
</head>
<body>

<!-- ══ 方案切换栏 ══ -->
<div id="variant-bar">
  <span class="label">迁移工具原型：</span>
  <button class="v-tab active" onclick="switchVariant('a', this)">完整流程</button>
  <div style="flex:1;"></div>
  <button class="v-demo-toggle" onclick="toggleDemoMode(this)">交互说明</button>
</div>

<!-- ══ 演示控件 ══ -->
<div class="demo-control">
  <label>步骤跳转</label>
  <button class="demo-btn" onclick="goStep(1)">① 环境准备</button>
  <button class="demo-btn" onclick="goStep(2)">② 资产扫描</button>
  <button class="demo-btn" onclick="goStep(3)">③ 预览映射</button>
  <button class="demo-btn" onclick="goStep(4)">④ 确认冲突</button>
  <button class="demo-btn" onclick="goStep(5)">⑤ 执行迁移</button>
  <button class="demo-btn" onclick="goStep(6)">⑥ 迁移报告</button>
  <div style="height:4px;border-top:1px solid rgba(255,255,255,0.08);margin:4px 0;"></div>
  <label>环境准备状态</label>
  <button class="demo-btn" onclick="setEnvState('checking')">检测中</button>
  <button class="demo-btn" onclick="setEnvState('warn-version')">版本警告</button>
  <button class="demo-btn" onclick="setEnvState('ok')">全部通过</button>
  <div style="height:4px;border-top:1px solid rgba(255,255,255,0.08);margin:4px 0;"></div>
  <label>资产扫描状态</label>
  <button class="demo-btn" onclick="setScanState('scanning')">扫描中</button>
  <button class="demo-btn" onclick="setScanState('done')">扫描完成</button>
  <div style="height:4px;border-top:1px solid rgba(255,255,255,0.08);margin:4px 0;"></div>
  <label>执行迁移进度</label>
  <button class="demo-btn" onclick="setExecProgress(30)">30%</button>
  <button class="demo-btn" onclick="setExecProgress(70)">70%</button>
  <button class="demo-btn" onclick="setExecProgress(100)">完成</button>
</div>

<div id="variant-a" class="variant active">
  <div class="app-shell">

    <!-- 页头 -->
    <div class="app-header">
      <div class="app-logo">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 2L3 7v11h14V7L10 2z"/>
          <path d="M7 18v-6h6v6"/>
        </svg>
      </div>
      <div>
        <div class="app-title">ChatBI 迁移工具</div>
        <div class="app-subtitle">将 ChatBI 资产一键迁移至 Dora Agent</div>
      </div>
    </div>

    <!-- 步骤导航 -->
    <div class="step-nav" id="stepNav">
      <!-- 由 JS 渲染 -->
    </div>

    <!-- 步骤内容区 -->
    <div id="stepContent"></div>

  </div>

  <!-- 底部操作栏 -->
  <div class="action-bar">
    <button class="btn btn-secondary" id="btnBack" onclick="stepBack()" style="display:none">上一步</button>
    <button class="btn btn-primary" id="btnNext" onclick="stepNext()">开始检测</button>
  </div>
</div>

<script>
  // ── 状态 ──
  const STEPS = [
    { id: 1, label: '环境准备' },
    { id: 2, label: '资产扫描' },
    { id: 3, label: '预览映射' },
    { id: 4, label: '确认冲突' },
    { id: 5, label: '执行迁移' },
    { id: 6, label: '完成' },
  ];

  let currentStep = 1;
  let envState = 'idle'; // idle | checking | warn-version | ok | error
  let scanState = 'idle'; // idle | scanning | done
  let execProgress = 0;
  let conflictResolutions = { agent_sales: 'rename', biz_kb: 'merge' };

  // ── 渲染步骤导航 ──
  function renderStepNav() {
    const nav = document.getElementById('stepNav');
    let html = '';
    STEPS.forEach((s, i) => {
      const isDone = s.id < currentStep;
      const isActive = s.id === currentStep;
      html += `
        <div class="step-item">
          <div class="step-circle ${isDone ? 'done' : isActive ? 'active' : ''}">
            ${isDone ? `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l3 3 5-5"/></svg>` : s.id}
          </div>
          <div class="step-label ${isDone ? 'done' : isActive ? 'active' : ''}">${s.label}</div>
        </div>`;
      if (i < STEPS.length - 1) {
        html += `<div class="step-connector ${isDone ? 'done' : ''}"></div>`;
      }
    });
    nav.innerHTML = html;
  }

  // ── 渲染步骤内容 ──
  function renderStep() {
    const content = document.getElementById('stepContent');
    const btnBack = document.getElementById('btnBack');
    const btnNext = document.getElementById('btnNext');

    btnBack.style.display = currentStep > 1 && currentStep < 6 ? 'block' : 'none';
    btnNext.disabled = false;

    if (currentStep === 1) {
      btnNext.textContent = envState === 'idle' ? '开始检测' : envState === 'ok' ? '下一步' : '重新检测';
      btnNext.disabled = envState === 'checking';
      content.innerHTML = renderStep1();
    } else if (currentStep === 2) {
      btnNext.textContent = scanState === 'done' ? '下一步' : '开始扫描';
      btnNext.disabled = scanState === 'scanning';
      content.innerHTML = renderStep2();
    } else if (currentStep === 3) {
      btnNext.textContent = '下一步：确认冲突';
      content.innerHTML = renderStep3();
    } else if (currentStep === 4) {
      btnNext.textContent = '开始迁移';
      content.innerHTML = renderStep4();
    } else if (currentStep === 5) {
      btnNext.textContent = '查看报告';
      btnNext.disabled = execProgress < 100;
      btnBack.style.display = 'none';
      content.innerHTML = renderStep5();
    } else if (currentStep === 6) {
      btnNext.textContent = '完成';
      btnBack.style.display = 'none';
      content.innerHTML = renderStep6();
    }
  }

  // ── Step 1: 环境准备 ──
  function renderStep1() {
    const checks = getEnvChecks();
    return `
      <div class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
          环境准备检测
        </div>
        <div class="check-list">
          ${checks.map(c => renderCheckItem(c)).join('')}
        </div>
      </div>`;
  }

  function getEnvChecks() {
    if (envState === 'idle') return [
      { name: 'ChatBI 插件检测', desc: '检测当前环境是否已安装 ChatBI 插件', status: 'idle' },
      { name: 'BI 大版本检测', desc: '检测 BI 版本是否满足迁移要求（≥ 7.0）', status: 'idle' },
      { name: '管理员权限检测', desc: '检测当前账号是否具有超管权限', status: 'idle' },
    ];
    if (envState === 'checking') return [
      { name: 'ChatBI 插件检测', desc: '检测中…', status: 'checking' },
      { name: 'BI 大版本检测', desc: '等待中…', status: 'idle' },
      { name: '管理员权限检测', desc: '等待中…', status: 'idle' },
    ];
    if (envState === 'warn-version') return [
      { name: 'ChatBI 插件检测', desc: 'ChatBI 插件版本 2.3.1，检测通过', status: 'ok' },
      { name: 'BI 大版本检测', desc: '当前版本 6.1，低于 7.0', status: 'warn',
        extra: '6.1 的 ChatBI 需要先将 BI 升级至 7.0，再执行迁移。请先完成版本升级后返回此页。' },
      { name: '管理员权限检测', desc: '当前账号：admin@corp.com（超管）', status: 'ok' },
    ];
    if (envState === 'ok') return [
      { name: 'ChatBI 插件检测', desc: 'ChatBI 插件版本 2.3.1，检测通过', status: 'ok' },
      { name: 'BI 大版本检测', desc: '当前版本 7.2，检测通过', status: 'ok' },
      { name: '管理员权限检测', desc: '当前账号：admin@corp.com（超管）', status: 'ok' },
    ];
    return [];
  }

  function renderCheckItem(c) {
    let iconHtml = '';
    let itemClass = 'check-item';
    if (c.status === 'checking') {
      iconHtml = `<div class="check-icon spin"></div>`;
      itemClass += ' checking';
    } else if (c.status === 'ok') {
      iconHtml = `<div class="check-icon ok"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6l3 3 5-5"/></svg></div>`;
      itemClass += ' ok';
    } else if (c.status === 'warn') {
      iconHtml = `<div class="check-icon warn"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v3M6 9h.01"/></svg></div>`;
      itemClass += ' warn';
    } else if (c.status === 'error') {
      iconHtml = `<div class="check-icon error"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l6 6M9 3l-6 6"/></svg></div>`;
      itemClass += ' error';
    } else {
      iconHtml = `<div class="check-icon" style="border:2px solid var(--neutral-3);"></div>`;
    }
    return `
      <div class="${itemClass}">
        ${iconHtml}
        <div class="check-body">
          <div class="check-name">${c.name}</div>
          <div class="check-desc">${c.desc}</div>
          ${c.extra ? `<div class="check-extra"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 4v3M6 9h.01"/></svg>${c.extra}</div>` : ''}
        </div>
      </div>`;
  }

  // ── Step 2: 资产扫描 ──
  function renderStep2() {
    const isScanning = scanState === 'scanning';
    const isDone = scanState === 'done';
    return `
      <div class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8h6M5 5h6M5 11h4"/></svg>
          资产扫描
        </div>
        <p style="font-size:13px;color:var(--neutral-9);margin-bottom:16px;">自动识别 ChatBI 中待迁移的数据标签、分析主题、业务知识和业务用语。</p>
        <div class="scan-grid">
          <div class="scan-cell">
            <div class="scan-cell-label">数据标签</div>
            <div class="scan-cell-count ${isScanning || !isDone ? 'loading' : ''}">${isDone ? '12' : ''}</div>
          </div>
          <div class="scan-cell">
            <div class="scan-cell-label">分析主题</div>
            <div class="scan-cell-count ${isScanning || !isDone ? 'loading' : ''}">${isDone ? '5' : ''}</div>
          </div>
          <div class="scan-cell">
            <div class="scan-cell-label">业务知识</div>
            <div class="scan-cell-count ${isScanning || !isDone ? 'loading' : ''}">${isDone ? '34' : ''}</div>
          </div>
          <div class="scan-cell">
            <div class="scan-cell-label">业务用语</div>
            <div class="scan-cell-count ${isScanning || !isDone ? 'loading' : ''}">${isDone ? '89' : ''}</div>
          </div>
        </div>
        <div class="scan-status ${isDone ? 'done' : 'scanning'}" style="margin-top:14px;">
          ${isScanning ? `
            <div style="width:14px;height:14px;border-radius:50%;border:2px solid var(--neutral-3);border-top-color:var(--brand-7);animation:spin 0.8s linear infinite;flex-shrink:0;"></div>
            <span>正在扫描 ChatBI 资产…</span>
          ` : isDone ? `
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 7l3.5 3.5 5.5-7"/></svg>
            <span>扫描完成，共发现 <strong>140</strong> 项资产，其中 <strong>2</strong> 项存在命名冲突</span>
          ` : `
            <span style="color:var(--neutral-8);">点击「开始扫描」自动识别 ChatBI 资产</span>
          `}
        </div>
      </div>`;
  }

  // ── Step 3: 预览映射结果 ──
  function renderStep3() {
    return `
      <div class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8h12M8 2l6 6-6 6"/></svg>
          映射预览
        </div>
        <div class="mapping-section">
          <div class="mapping-section-title">数据源 → Agent 数据集</div>
          <div class="mapping-row">
            <span class="mapping-tag">数据标签</span>
            <div class="mapping-name">销售分析数据集</div>
            <div class="mapping-arrow"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg></div>
            <div class="mapping-name">销售分析数据集</div>
          </div>
          <div class="mapping-row">
            <span class="mapping-tag">分析主题</span>
            <div class="mapping-name">用户增长分析</div>
            <div class="mapping-arrow"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg></div>
            <div class="mapping-name">用户增长分析</div>
          </div>
          <div class="mapping-row conflict">
            <span class="mapping-tag">分析主题</span>
            <div class="mapping-name">Agent 销售助手</div>
            <div class="mapping-arrow"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg></div>
            <div class="mapping-name">Agent 销售助手</div>
            <span class="conflict-badge">命名冲突</span>
          </div>
        </div>
        <div class="mapping-section">
          <div class="mapping-section-title">业务知识 → 知识库</div>
          <div class="mapping-row">
            <span class="mapping-tag">业务知识</span>
            <div class="mapping-name">产品术语表</div>
            <div class="mapping-arrow"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg></div>
            <div class="mapping-name">产品术语表</div>
          </div>
          <div class="mapping-row conflict">
            <span class="mapping-tag">业务知识</span>
            <div class="mapping-name">业务知识库</div>
            <div class="mapping-arrow"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg></div>
            <div class="mapping-name">业务知识库</div>
            <span class="conflict-badge">命名冲突</span>
          </div>
          <div class="mapping-row">
            <span class="mapping-tag">业务用语</span>
            <div class="mapping-name">销售指标词典</div>
            <div class="mapping-arrow"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h10M8 3l4 4-4 4"/></svg></div>
            <div class="mapping-name">销售指标词典</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--neutral-8);text-align:right;">共 140 项 · 2 项冲突需处理</div>
      </div>`;
  }

  // ── Step 4: 确认和调整 ──
  function renderStep4() {
    return `
      <div class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4l3 3M14 8a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
          冲突处理
        </div>
        <p style="font-size:13px;color:var(--neutral-9);margin-bottom:16px;">以下 2 项资产与 Dora 中已有内容存在命名冲突，请选择处理方式。</p>

        <div class="conflict-item">
          <div class="conflict-item-header">
            <span class="conflict-type">命名冲突</span>
            <span class="conflict-name">Agent 销售助手</span>
            <span style="font-size:12px;color:var(--neutral-8);">分析主题</span>
          </div>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="conflict_agent_sales" value="rename" ${conflictResolutions.agent_sales === 'rename' ? 'checked' : ''} onchange="setResolution('agent_sales','rename')"/>
              重命名为「Agent 销售助手（迁移）」
            </label>
            <label class="radio-label">
              <input type="radio" name="conflict_agent_sales" value="overwrite" ${conflictResolutions.agent_sales === 'overwrite' ? 'checked' : ''} onchange="setResolution('agent_sales','overwrite')"/>
              覆盖已有内容
            </label>
            <label class="radio-label">
              <input type="radio" name="conflict_agent_sales" value="skip" ${conflictResolutions.agent_sales === 'skip' ? 'checked' : ''} onchange="setResolution('agent_sales','skip')"/>
              跳过，不迁移此项
            </label>
          </div>
        </div>

        <div class="conflict-item">
          <div class="conflict-item-header">
            <span class="conflict-type">命名冲突</span>
            <span class="conflict-name">业务知识库</span>
            <span style="font-size:12px;color:var(--neutral-8);">业务知识</span>
          </div>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="conflict_biz_kb" value="rename" ${conflictResolutions.biz_kb === 'rename' ? 'checked' : ''} onchange="setResolution('biz_kb','rename')"/>
              重命名为「业务知识库（迁移）」
            </label>
            <label class="radio-label">
              <input type="radio" name="conflict_biz_kb" value="merge" ${conflictResolutions.biz_kb === 'merge' ? 'checked' : ''} onchange="setResolution('biz_kb','merge')"/>
              合并到已有知识库
            </label>
            <label class="radio-label">
              <input type="radio" name="conflict_biz_kb" value="skip" ${conflictResolutions.biz_kb === 'skip' ? 'checked' : ''} onchange="setResolution('biz_kb','skip')"/>
              跳过，不迁移此项
            </label>
          </div>
        </div>
      </div>`;
  }

  // ── Step 5: 执行迁移 ──
  function renderStep5() {
    const isRunning = execProgress > 0 && execProgress < 100;
    const isDone = execProgress >= 100;
    const logs = getExecLogs();
    return `
      <div class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a7 7 0 1014 0A7 7 0 003 8zm5-3l4 3-4 3V5z" fill="none"/></svg>
          执行迁移
        </div>
        <div class="exec-progress">
          <div class="progress-track"><div class="progress-fill" style="width:${execProgress}%"></div></div>
          <div class="progress-label"><span>${isDone ? '迁移完成' : isRunning ? '迁移中…' : '准备就绪'}</span><span>${execProgress}%</span></div>
        </div>
        <div class="exec-log">
          ${logs.map(l => `<div class="log-line ${l.type}">${l.text}</div>`).join('')}
          ${isRunning ? '<div class="log-line info">▌</div>' : ''}
        </div>
      </div>`;
  }

  function getExecLogs() {
    if (execProgress === 0) return [
      { type: '', text: '$ 等待开始迁移…' },
    ];
    const all = [
      { type: 'info', text: '[INFO] 开始执行迁移任务' },
      { type: '', text: '[INFO] 连接 ChatBI 数据源…' },
      { type: 'ok', text: '[OK]   数据源连接成功' },
      { type: '', text: '[INFO] 正在迁移数据标签（12 项）…' },
      { type: 'ok', text: '[OK]   数据标签迁移完成' },
      { type: '', text: '[INFO] 正在迁移分析主题（5 项）…' },
      { type: 'warn', text: '[SKIP] "Agent 销售助手" 已重命名为 "Agent 销售助手（迁移）"' },
      { type: 'ok', text: '[OK]   分析主题迁移完成' },
      { type: '', text: '[INFO] 正在迁移业务知识（34 项）…' },
      { type: 'ok', text: '[OK]   "业务知识库" 已合并' },
      { type: 'ok', text: '[OK]   业务知识迁移完成' },
      { type: '', text: '[INFO] 正在迁移业务用语（89 项）…' },
      { type: 'ok', text: '[OK]   业务用语迁移完成' },
      { type: 'ok', text: '[OK]   迁移任务全部完成 ✓' },
    ];
    const count = Math.floor(execProgress / 100 * all.length);
    return all.slice(0, Math.max(1, count));
  }

  // ── Step 6: 迁移报告 ──
  function renderStep6() {
    return `
      <div class="card">
        <div class="success-banner">
          <div class="success-icon">
            <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 14l6 6L23 8"/></svg>
          </div>
          <div class="success-title">迁移成功</div>
          <div class="success-desc">ChatBI 资产已全部迁移至 Dora Agent</div>
        </div>
        <div class="report-summary">
          <div class="report-stat">
            <div class="report-stat-num ok">139</div>
            <div class="report-stat-label">成功迁移</div>
          </div>
          <div class="report-stat">
            <div class="report-stat-num warn">1</div>
            <div class="report-stat-label">重命名处理</div>
          </div>
          <div class="report-stat">
            <div class="report-stat-num">0</div>
            <div class="report-stat-label">迁移失败</div>
          </div>
        </div>
        <div style="border-top:1px solid var(--neutral-3);padding-top:16px;">
          <div style="font-size:13px;font-weight:500;color:var(--neutral-10);margin-bottom:10px;">迁移明细</div>
          <div style="display:flex;flex-direction:column;gap:6px;font-size:13px;">
            <div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:6px;background:var(--neutral-1);">
              <span style="color:var(--neutral-9);">数据标签</span><span style="color:var(--neutral-10);font-weight:500;">12 项 · 全部成功</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:6px;background:var(--neutral-1);">
              <span style="color:var(--neutral-9);">分析主题</span><span style="color:var(--neutral-10);font-weight:500;">5 项 · 1 项重命名</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:6px;background:var(--neutral-1);">
              <span style="color:var(--neutral-9);">业务知识</span><span style="color:var(--neutral-10);font-weight:500;">34 项 · 全部成功</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:8px 12px;border-radius:6px;background:var(--neutral-1);">
              <span style="color:var(--neutral-9);">业务用语</span><span style="color:var(--neutral-10);font-weight:500;">89 项 · 全部成功</span>
            </div>
          </div>
        </div>
      </div>`;
  }

  // ── 交互逻辑 ──
  function stepNext() {
    if (currentStep === 1) {
      if (envState === 'idle' || envState === 'warn-version') {
        setEnvState('checking');
        setTimeout(() => { setEnvState('ok'); }, 1800);
        return;
      }
      if (envState === 'checking') return;
      if (envState === 'ok') { currentStep = 2; scanState = 'idle'; }
    } else if (currentStep === 2) {
      if (scanState !== 'done') {
        setScanState('scanning');
        setTimeout(() => setScanState('done'), 2000);
        return;
      }
      currentStep = 3;
    } else if (currentStep === 3) {
      currentStep = 4;
    } else if (currentStep === 4) {
      currentStep = 5;
      execProgress = 0;
      startExec();
    } else if (currentStep === 5) {
      if (execProgress >= 100) currentStep = 6;
    } else if (currentStep === 6) {
      alert('迁移工具关闭，返回主系统。');
    }
    renderStepNav();
    renderStep();
  }

  function stepBack() {
    if (currentStep > 1) { currentStep--; }
    renderStepNav();
    renderStep();
  }

  function startExec() {
    let p = 0;
    const intervals = [500, 600, 400, 700, 500, 600, 400, 500];
    let i = 0;
    function tick() {
      if (i >= intervals.length) { setExecProgress(100); return; }
      p += Math.floor(100 / intervals.length);
      setExecProgress(Math.min(p, 95));
      i++;
      setTimeout(tick, intervals[i - 1]);
    }
    setTimeout(tick, 200);
  }

  function setResolution(key, val) {
    conflictResolutions[key] = val;
  }

  // ── Demo 控制 ──
  function switchVariant(id, el) {
    document.querySelectorAll('.variant').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.v-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('variant-' + id).classList.add('active');
    el.classList.add('active');
  }

  function toggleDemoMode(el) {
    document.body.classList.toggle('demo-mode');
    el.classList.toggle('active');
  }

  function goStep(n) {
    currentStep = n;
    if (n === 2 && scanState === 'idle') scanState = 'done';
    if (n >= 5) execProgress = n >= 6 ? 100 : 80;
    renderStepNav();
    renderStep();
  }

  function setEnvState(state) {
    envState = state;
    renderStep();
    document.getElementById('btnNext').disabled = state === 'checking';
    document.getElementById('btnNext').textContent = state === 'idle' ? '开始检测' : state === 'ok' ? '下一步' : state === 'checking' ? '检测中…' : '重新检测';
  }

  function setScanState(state) {
    scanState = state;
    renderStep();
    const btn = document.getElementById('btnNext');
    btn.disabled = state === 'scanning';
    btn.textContent = state === 'done' ? '下一步' : state === 'scanning' ? '扫描中…' : '开始扫描';
  }

  function setExecProgress(p) {
    execProgress = p;
    renderStep();
    const btn = document.getElementById('btnNext');
    btn.disabled = p < 100;
    btn.textContent = p >= 100 ? '查看报告' : '执行中…';
  }

  // ── 初始化 ──
  renderStepNav();
  renderStep();
</script>

</body>
</html>
